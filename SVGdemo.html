<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVGDemo</title>
</head>
<body>
    <svg height = "500" width = "500" style = "border:2px solid black;">
        <rect x = "30" y  ="30" height = "100" width = "200" fill = "maroon" stroke="turquoise" stroke-width = "4" stroke-opacity = "0.5" rx = "10" ry = "10"></rect>
            <rect x = "40" y  ="40" height = "100" width = "200" fill = "none" stroke="turquoise" stroke-dasharray = "40 10" fill-opacity = "0.5"></rect>
            
    </svg>
    <svg height = "500" width = "500" >
        <rect x = "30" y  ="30" height = "200" width = "200" fill = "maroon" stroke="turquoise" stroke-width = "4" rx = "100" ry = "100"></rect>
    </svg>
    <svg height = "200" width = "200" style = "border:2px solid black;">
        <circle cx = "100" cy ="100" r = "50" fill = "white" stroke = "black" stroke-width = "5"></circle>
    </svg>
    <svg height = "200" width = "200" style = "border:2px solid black;">
        <ellipse cx = "100" cy = "100" rx = "25" ry = "50" fill = "green"></ellipse>
    </svg>
    <svg height = "200" width = "200" style = "border:2px solid black;">
        <polygon points = "0,100 100,0 200,100" fill = "none" stroke = "black"></polygon>
        <polygon points = "0,40 100,140 200,40" fill = "none" stroke = "black"></polygon>
    </svg>
    <svg height = "200" width = "200" style = "border:2px solid black;">
        <polygon points = "30,180 100,40 170,180 10,90 190,90" fill = "pink" stroke = "black" stroke-width = "2" fill-rule = "evenodd"></polygon>
    </svg>
    <svg height = "200" width = "200" style = "border:2px solid black;">
        <line x1 = 0 y1 = 0 x2 = 200 y2 = 200 stroke = "green" stroke-width = "2"></line>
        <line x1 = 200 y1 = 0 x2 = 0 y2 = 200 stroke = "green" stroke-width = "2"></line>
    </svg>
    <svg height = "200" width = "200" style = "border:2px solid black;">
        <text x="0" y = "100" font-size = "30" font-family = "stencil" fill = "pink" stroke = "black" stroke-width = "2">Hello World</text>
    </svg>
</body>
</html>
