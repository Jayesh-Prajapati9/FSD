<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<body>
    <form action = "success.html">
        <fieldset>
            <legend align = "center">LOGIN</legend>
            <table>
                <tr>
                    <td><label for = "uname">Name: </label></td>
                    <td><input id = "uname" type = "text" required minlength="2" placeholder="Enter Name"></td>
                </tr>
                <tr>
                    <td><label for = "pass">Password: </label></td>
                    <td><input type = "password" required placeholder="Enter Password" id = "pass"></td>
                    </tr>
            </table>
            <input type = "checkbox" id = "rem"> <label for = "rem">Remember Me</label><br><br>
            <input type = "submit" value = "LOGIN">&nbsp;&nbsp;&nbsp;<input type = "reset" value = "Cancel"><br><br>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href = "Details.html"><input type = "button" value = "Signup"></a>
        </fieldset>
    </form>
</body>
</html>
