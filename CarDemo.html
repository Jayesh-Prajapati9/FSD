<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Night</title>
</head>
<body>
    <svg height = "500" width = "500">
        <rect x = "0" y = "0" height = "500" width = "500" fill = "white" stroke = "black" stroke-width="3"></rect>
        <rect x = "0" y = "400" height = "100" width = "500" fill = "white" stroke = "black" stroke-width="3"></rect>
        <circle cx = "150" cy = "370" r = "30" fill = "none" stroke = "black" stroke-width="3"></circle>
        <circle cx = "350" cy = "370" r = "30" fill = "none" stroke = "black" stroke-width="3"></circle>
        <circle cx = "150" cy = "370" r = "10" fill = "none" stroke = "black" stroke-width="3"></circle>
        <circle cx = "350" cy = "370" r = "10" fill = "none" stroke = "black" stroke-width="3"></circle>
        <rect x = "50" y = "290" height = "50" width = "400" fill = "white" stroke = "black" stroke-width="3"></rect>
        <polygon points = "100,290 170,230 300,230 370,290" fill = "none" stroke = "black" stroke-width="3"></polygon>
    </svg> 
</body>
</html>
