<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<table border = "1px" rules = "all">
    <caption>Rowspan Table</caption>
    <tr>
        <td rowspan="2" align = "center">Hello</td>
        <td>Hi</td>
    </tr>
    <tr>
        <td>How are you</td>
    </tr>
</table><br>
<table border = "1px" rules = "all">
    <caption>Colspan Table</caption>
    <tr>
        <td colspan = "2" align = "center">
            Hello
        </td>
    </tr>
    <tr>
        <td>
            Hi
        </td>
        <td>
            How are you
        </td>
    </tr>
</table><br>
<table border = "1px" rules = "all">
    <caption>Both</caption>
    <tr>
        <td rowspan = "2" align = "center">1</td>
        <td colspan = "2" align = "center">2</td>
    </tr>
    <tr>
        <td>3</td>
        <td>4</td>
    </tr>
</table>
</html>
