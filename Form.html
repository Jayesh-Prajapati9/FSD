<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <fieldset> <legend align = "center">Trying different tags</legend>
            <label>Text: </label> <input type = "text" required placeholder="Enter name" maxlength="10" minlength = "2"> <br>
            <label>Checkbox: </label> <input type = "checkbox" checked> <br>
            <label>Radio button: </label> <input type = "radio" name = "button" value = "Male"> <label>Male</label> <br>
            <label>Radio button: </label> <input type = "radio" name = "button" checked value = "Female"> <label>Female</label> <br>
            <label>Submit: </label> <input type = "submit"> <br>
            <label>Reset: </label> <input type = "reset"> <br>
            <label>File: </label> <input type = "file"> <br>
            <label>color: </label> <input type = "color"> <br>
            <label>Search: </label> <input type = "search" autofocus height="500px" width = "500px"> <br>
            <label>Email: </label> <input type = "email" readonly> <br>
            <label>Telephone: </label> <input type = "tel"> <br>
            <label>Date: </label> <input type = "date"> <br>
            <label>Time: </label> <input type = "time"> <br>
            <label>Week: </label> <input type = "week"> <br>
            <label>Month: </label> <input type = "month"> <br>
            <label>Number: </label> <input type = "number" min = "5" max = "10" step = "2"> <br>
            <label>Button: </label> <input type = "button" value = "my button"> <br>
            <label>Range: </label> <input type = "range"> <br>
            <label>Password: </label> <input type = "password"> <br>
            <label>City: </label> <select>
                <option selected disabled hidden>--Select City--</option>
                <optgroup label = "Gujarat">
                <option>Ahmedabad</option>
                <option>Mumbai</option>
            </optgroup>
            <optgroup label = "Maharashtra">
                <option>Pune</option>
            </optgroup>
            </select><br>
            <label>Address: </label> <textarea rows = "3" cols = "20"></textarea> <br>
        </fieldset>
    </form>
</body>
</html>
