<html>
    <head>
        <style>
            input{
                background-color: pink;
                width:70px; transition-property: width;transition-duration:  5s ;
            }
            input:focus{
                width: 80px;
               
            }
            
        </style>
    </head>
    <body>
        <fieldset>
            <form>

                <input type="text" placeholder="EnterName">

                <input type="password" placeholder="Password">
                <br>
                <input type="submit">
                
                <input type="reset">
            </form>
        </fieldset>
    </body>
</html>
